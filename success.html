<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBVA | Kontakt & Auszahlung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><div class="container"><div class="logo">BBVA</div></div></header>

    <main class="container">
        <section class="promo-box">
            <h2>Schritt 2: Bestätigung</h2>
            <p>Kontaktieren Sie unseren Manager, um Ihre Daten zu übermitteln.</p>
            
            <div class="messenger-buttons">
                <a href="https://t.me/ТВОЙ_ТЕЛЕГРАМ" class="btn-msg tg">Telegram Manager</a>
                <a href="https://wa.me/ТВОЙ_НОМЕР" class="btn-msg wa">WhatsApp Support</a>
            </div>

            <div class="upload-section">
                <h3>Dokumente hochladen</h3>
                <p>Laden Sie einen Screenshot der Bestätigung und Ihren ID-Nachweis hoch:</p>
                <form>
                    <input type="file" id="file" multiple>
                    <button type="button" class="btn-main" onclick="alert('Daten gesendet! Kontaktieren Sie den Manager.')">Absenden</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
