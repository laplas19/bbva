<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestätigung - BBVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="main-card">
            <h1 class="title">Nächster Schritt</h1>
            
            <p class="description">
                Kontaktieren Sie zuerst einen Manager, um die Registrierung zu starten:
            </p>
            
            <a href="https://t.me/ВВА_official" class="btn-primary" style="background: #0088cc; margin-bottom: 12px;">
                Per Telegram
            </a>
            <a href="https://wa.me/34123456789" class="btn-primary" style="background: #25d366; margin-bottom: 25px;">
                Per WhatsApp
            </a>

            <div class="verification-form">
    <label>Nachricht an den Manager:</label>
    <textarea rows="3" placeholder="Ich bin bereit für die Verifizierung..."></textarea>

    <label>Dokument / Foto hochladen:</label>
    <div class="file-upload-container" onclick="document.getElementById('photo-upload').click()">
        <div class="upload-icon">📤</div>
        <div class="upload-text">
            <strong>Klicken Sie hier</strong>
            <span>oder Bild auswählen</span>
        </div>
        <input type="file" id="photo-upload" class="hidden-input" accept="image/*" onchange="updateFileName(this)">
    </div>
    <div id="file-name-display" class="file-name-info">Keine Datei ausgewählt</div>

    <button class="btn-primary" style="margin-top: 10px;" onclick="alert('Gesendet! Bitte warten Sie auf die Antwort.')">
        Daten absenden
    </button>
</div>

<script>
// Функция для отображения имени выбранного файла
function updateFileName(input) {
    const display = document.getElementById('file-name-display');
    if (input.files && input.files.length > 0) {
        display.textContent = "Ausgewählt: " + input.files[0].name;
        display.style.color = "#00d2ff";
    } else {
        display.textContent = "Keine Datei ausgewählt";
        display.style.color = "#8b949e";
    }
}
</script>
        </main>
    </div>
</body>
</html>
