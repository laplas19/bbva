<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestätigung - BBVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="main-card">
            <h1 class="title">Nächster Schritt</h1>
            
            <p class="description">
                Kontaktieren Sie zuerst einen Manager, um die Registrierung zu starten:
            </p>
            
            <a href="https://t.me/ВВА_official" class="btn-primary" style="background: #0088cc; margin-bottom: 12px;">
                Per Telegram
            </a>
            <a href="https://wa.me/34123456789" class="btn-primary" style="background: #25d366; margin-bottom: 25px;">
                Per WhatsApp
            </a>

            <div class="verification-form">
                <label>Nachricht an den Manager:</label>
                <textarea rows="3" placeholder="Ich bin bereit für die Verifizierung..."></textarea>

                <label>Foto hochladen (optional):</label>
                <input type="file" class="file-input" accept="image/*">

                <button class="btn-primary" onclick="alert('Gesendet! Bitte warten Sie auf die Antwort.')">
                    Daten absenden
                </button>
            </div>
        </main>
    </div>
</body>
</html>
